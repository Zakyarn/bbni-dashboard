<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BBNI Stock Prediction Dashboard</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- FLATPICKR -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

</head>

<body>

<div class="container">

    <!-- ================= HEADER ================= -->

    <div class="header">

        <div class="header-left">

            <h1>
                PT Bank Negara Indonesia (Persero) Tbk (BBNI.JK)
            </h1>

            <div class="close-time">
                Historical Stock Price Dashboard (January 2019 – December 2025)
            </div>

        </div>

        <div class="header-right">

            <div id="currentPrice">
                0.00
            </div>

            <div id="priceChange">
                0.00 (0.00%)
            </div>

        </div>

    </div>

    <!-- ================= FILTER ================= -->

    <div class="top-filter">

        <div class="date-picker-box">

            <label>Start Date</label>

            <input
                type="text"
                id="startDate"
                readonly
            />

        </div>

        <div class="date-picker-box">

            <label>End Date</label>

            <input
                type="text"
                id="endDate"
                readonl
            />

        </div>

        <button onclick="filterByDate()">

            Apply

        </button>

        <select
            id="intervalSelect"
            onchange="filterByDate()">

            <option value="daily">Daily</option>

            <option value="weekly">Weekly</option>

            <option value="monthly">Monthly</option>

        </select>

    </div>

    <!-- ================= INFO ================= -->

    <div class="info-box">

        <div class="card">

            <h3>Open</h3>

            <p id="open"></p>

        </div>

        <div class="card">

            <h3>High</h3>

            <p id="high"></p>

        </div>

        <div class="card">

            <h3>Low</h3>

            <p id="low"></p>

        </div>

        <div class="card">

            <h3>Close</h3>

            <p id="close"></p>

        </div>

        <div class="card">

            <h3>Volume</h3>

            <p id="volume"></p>

        </div>

    </div>

    <!-- ================= CHART ================= -->

    <div class="chart-box">

        <canvas id="stockChart"></canvas>

    </div>

    <p class="data-source">

        Data Source: Yahoo Finance. Historical stock price data of PT Bank Negara Indonesia (Persero) Tbk. (January 2019 – December 2025).

    </p>

</div>

<script src="script.js"></script>

</body>

</html>
